services:
  - type: worker
    name: telegram-ai-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: DEFAULT_PROVIDER
        value: openai
      - key: DEFAULT_MODEL
        value: gpt-4o
